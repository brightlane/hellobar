*{

body{
    margin:0;

.container{

}

.button{

    background:var(--accent);
    color:#fff;
    padding:16px 30px;
    border-radius:14px;
    text-decoration:none;
    font-weight:700;
    margin-top:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

}

.card{
    background:var(--card);
    border:1px solid #1e293b;
    border-radius:18px;
    padding:24px;
}

.card h3{
    margin-top:0;
}

a{
    color:#93c5fd;
    text-decoration:none;

table{
    width:100%;
    border-collapse:collapse;
    margin:30px 0;
}

th,td{
    border:1px solid #334155;
    padding:12px;
}

    background:#1e293b;
}

    margin:50px 0;
    padding:50px;
    border-radius:24px;
    text-align:center;
    background:linear-gradient(135deg,#16a34a,#15803d);
}

footer{
    padding:40px 0;
    text-align:center;
    color:var(--muted);
}

.meta{
    color:var(--muted);
    margin-bottom:20px;
}

ul{
